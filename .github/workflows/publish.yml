name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Build, publish to PyPI, and create the GitHub Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rule-coherence-graph
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing — no API token needed
      contents: write   # create the GitHub Release for the tag
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
