name: Fly Deploy

# Manual deploy of the hosted MCP demo to Fly.io. Runs flyctl in a clean CI
# environment with a scoped token (FLY_API_TOKEN secret), sidestepping local
# CLI issues. Creates the app on first run, then deploys from fly.toml.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it does not exist
        run: |
          app=$(grep -E '^app\s*=' fly.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "App from fly.toml: $app"
          if flyctl status --app "$app" >/dev/null 2>&1; then
            echo "App $app already exists."
          else
            echo "Creating app $app ..."
            flyctl apps create "$app" --org personal
          fi

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false
