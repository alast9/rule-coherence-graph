site_name: Rule Coherence Graph (RCG)
site_description: Detect conflicts in the rule corpora that govern AI coding agents — before the agent does.
site_url: https://alast9.github.io/rule-coherence-graph/
repo_url: https://github.com/alast9/rule-coherence-graph
repo_name: alast9/rule-coherence-graph
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Coding assistants (MCP): mcp-clients.md
  - Benchmark: benchmark.md
  - Design & schema: SPEC.md
  - Releasing: RELEASING.md
